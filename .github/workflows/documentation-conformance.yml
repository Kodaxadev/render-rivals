name: Documentation and Research Conformance

on:
  pull_request:
    paths:
      - "README.md"
      - "DOCUMENT-MANIFEST.md"
      - "MANIFEST.json"
      - "LICENSE-TBD.md"
      - "spec/**"
      - "adr/**"
      - "docs/**"
      - "schemas/**"
      - "sources/**"
      - "archive/**"
      - "brand/**"
      - "security/**"
      - "conformance/**"
      - "research/**"
      - ".github/workflows/documentation-conformance.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCUMENT-MANIFEST.md"
      - "MANIFEST.json"
      - "LICENSE-TBD.md"
      - "spec/**"
      - "adr/**"
      - "docs/**"
      - "schemas/**"
      - "sources/**"
      - "archive/**"
      - "brand/**"
      - "security/**"
      - "conformance/**"
      - "research/**"
      - ".github/workflows/documentation-conformance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    # Windows is the declared reference host in docs/TEST-AND-VALIDATION-STRATEGY.md,
    # so repository tooling is proven on it rather than on Linux alone.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check clean-tree documentation conformance
        run: node conformance/check.mjs --json
      - name: Run documentation mutation and inventory suites
        run: node --test conformance/check.test.mjs conformance/check-stage05-research.test.mjs
      - name: Run Stage 0.5 research-kit tests
        run: node --test research/stage-0.5/kit.test.mjs
